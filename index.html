<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 30px 20px;
    }

    #root {
      max-width: 750px;
      margin: 0 auto;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .header p {
      margin-top: 6px;
      opacity: 0.85;
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 20px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 10px 20px;
      text-align: center;
    }

    .stat-number {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .stat-label {
      font-size: 0.75rem;
      opacity: 0.85;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .body {
      padding: 28px;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .task-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input:focus {
      border-color: #667eea;
    }

    .select-input {
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      background: white;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .select-input:focus {
      border-color: #667eea;
    }

    .add-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 20px;
      background: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-color: transparent;
    }

    .filter-btn:hover:not(.active) {
      border-color: #667eea;
      color: #667eea;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid #f0f0f0;
      border-radius: 12px;
      background: #fafafa;
      transition: all 0.2s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover {
      border-color: #667eea;
      background: #f8f7ff;
    }

    .task-item.completed {
      opacity: 0.6;
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: #667eea;
      flex-shrink: 0;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 0.97rem;
      color: #2d3748;
      word-break: break-word;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .priority-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .priority-high   { background: #fed7d7; color: #c53030; }
    .priority-medium { background: #fefcbf; color: #b7791f; }
    .priority-low    { background: #c6f6d5; color: #276749; }

    .category-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #e9d8fd;
      color: #6b46c1;
      font-weight: 500;
    }

    .task-date {
      font-size: 0.72rem;
      color: #a0aec0;
    }

    .task-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .icon-btn:hover {
      background: #edf2f7;
    }

    .delete-btn:hover {
      background: #fed7d7;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #a0aec0;
    }

    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 1rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px dashed #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #e53e3e;
      background: #fff5f5;
    }

    @media (max-width: 520px) {
      .input-row { flex-direction: column; }
      .stats { gap: 12px; }
      .stat { padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const PRIORITIES = ['high', 'medium', 'low'];
    const CATEGORIES = ['Work', 'Personal', 'Shopping', 'Health', 'Other'];
    const FILTERS    = ['All', 'Active', 'Completed'];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function App() {
      const [tasks,       setTasks]       = useState([
        { id: 1, text: 'Design the homepage layout', priority: 'high',   category: 'Work',     completed: false, createdAt: new Date().toISOString() },
        { id: 2, text: 'Buy groceries for the week',  priority: 'medium', category: 'Shopping', completed: false, createdAt: new Date().toISOString() },
        { id: 3, text: 'Morning jog – 30 minutes',    priority: 'low',    category: 'Health',   completed: true,  createdAt: new Date().toISOString() },
      ]);
      const [text,        setText]        = useState('');
      const [priority,    setPriority]    = useState('medium');
      const [category,    setCategory]    = useState('Work');
      const [filter,      setFilter]      = useState('All');
      const [editId,      setEditId]      = useState(null);
      const [editText,    setEditText]    = useState('');

      const filtered = useMemo(() => {
        return tasks.filter(t =>
          filter === 'All'       ? true :
          filter === 'Active'    ? !t.completed :
                                    t.completed
        );
      }, [tasks, filter]);

      const total     = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const active    = total - completed;

      function addTask() {
        const trimmed = text.trim();
        if (!trimmed) return;
        setTasks(prev => [
          { id: Date.now(), text: trimmed, priority, category, completed: false, createdAt: new Date().toISOString() },
          ...prev,
        ]);
        setText('');
      }

      function toggleTask(id) {
        setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
      }

      function deleteTask(id) {
        setTasks(prev => prev.filter(t => t.id !== id));
      }

      function startEdit(task) {
        setEditId(task.id);
        setEditText(task.text);
      }

      function saveEdit(id) {
        const trimmed = editText.trim();
        if (!trimmed) return;
        setTasks(prev => prev.map(t => t.id === id ? { ...t, text: trimmed } : t));
        setEditId(null);
      }

      function clearCompleted() {
        setTasks(prev => prev.filter(t => !t.completed));
      }

      return (
        <div className="app">
          {/* Header */}
          <div className="header">
            <h1>✅ Task Manager</h1>
            <p>Stay organised, stay productive</p>
            <div className="stats">
              <div className="stat">
                <div className="stat-number">{total}</div>
                <div className="stat-label">Total</div>
              </div>
              <div className="stat">
                <div className="stat-number">{active}</div>
                <div className="stat-label">Active</div>
              </div>
              <div className="stat">
                <div className="stat-number">{completed}</div>
                <div className="stat-label">Done</div>
              </div>
            </div>
          </div>

          {/* Body */}
          <div className="body">

            {/* Add Task */}
            <div className="input-section">
              <div className="input-row">
                <input
                  className="task-input"
                  type="text"
                  placeholder="Add a new task…"
                  value={text}
                  onChange={e => setText(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && addTask()}
                />
                <button className="add-btn" onClick={addTask}>+ Add</button>
              </div>
              <div className="input-row">
                <select className="select-input" value={priority} onChange={e => setPriority(e.target.value)}>
                  {PRIORITIES.map(p => <option key={p} value={p}>{p.charAt(0).toUpperCase() + p.slice(1)} Priority</option>)}
                </select>
                <select className="select-input" value={category} onChange={e => setCategory(e.target.value)}>
                  {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
            </div>

            {/* Filters */}
            <div className="filters">
              {FILTERS.map(f => (
                <button
                  key={f}
                  className={`filter-btn ${filter === f ? 'active' : ''}`}
                  onClick={() => setFilter(f)}
                >{f} {f === 'All' ? `(${total})` : f === 'Active' ? `(${active})` : `(${completed})`}</button>
              ))}
            </div>

            {/* Task List */}
            <div className="task-list">
              {filtered.length === 0 ? (
                <div className="empty-state">
                  <div className="emoji">{filter === 'Completed' ? '🎉' : '📝'}</div>
                  <p>{filter === 'Completed' ? 'No completed tasks yet!' : 'No tasks here. Add one above!'}</p>
                </div>
              ) : (
                filtered.map(task => (
                  <div key={task.id} className={`task-item ${task.completed ? 'completed' : ''}`}>
                    <input
                      type="checkbox"
                      className="checkbox"
                      checked={task.completed}
                      onChange={() => toggleTask(task.id)}
                    />
                    <div className="task-content">
                      {editId === task.id ? (
                        <input
                          className="task-input"
                          style={{ padding: '6px 10px', fontSize: '0.95rem' }}
                          value={editText}
                          onChange={e => setEditText(e.target.value)}
                          onKeyDown={e => { if (e.key === 'Enter') saveEdit(task.id); if (e.key === 'Escape') setEditId(null); }}
                          autoFocus
                        />
                      ) : (
                        <div className={`task-text ${task.completed ? 'completed' : ''}`}>{task.text}</div>
                      )}
                      <div className="task-meta">
                        <span className={`priority-badge priority-${task.priority}`}>{task.priority}</span>
                        <span className="category-badge">{task.category}</span>
                        <span className="task-date">{formatDate(task.createdAt)}</span>
                      </div>
                    </div>
                    <div className="task-actions">
                      {editId === task.id ? (
                        <button className="icon-btn" title="Save" onClick={() => saveEdit(task.id)}>💾</button>
                      ) : (
                        <button className="icon-btn" title="Edit" onClick={() => startEdit(task)}>✏️</button>
                      )}
                      <button className="icon-btn delete-btn" title="Delete" onClick={() => deleteTask(task.id)}>🗑️</button>
                    </div>
                  </div>
                ))
              )}
            </div>

            {/* Clear Completed */}
            {completed > 0 && (
              <button className="clear-btn" onClick={clearCompleted}>
                🧹 Clear {completed} completed task{completed > 1 ? 's' : ''}
              </button>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
